services:
  - type: web
    name: virtualfit-ai-backend
    env: node
    plan: starter
    buildCommand: npm install && npm run build:server
    startCommand: npm run start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
